<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PJRT 코드 구조 분석</title>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0b0f17;
      --surface: #131a26;
      --border: #2a3546;
      --text: #eef3fa;
      --muted: #9eacbf;
      --accent: #76a9fa;
      --max-width: 980px;
      --content-width: 1120px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.75;
    }
    a { color: var(--accent); }
    .page-shell {
      width: min(calc(100% - 32px), var(--content-width));
      margin: 0 auto;
    }
    .article-width {
      max-width: var(--max-width);
    }
    header {
      padding: 18px 0 42px;
      border-bottom: 1px solid var(--border);
      background: #0d1117;
    }
    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 30px;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 0.84rem;
      text-decoration: none;
    }
    .back-link:hover {
      border-color: var(--accent);
      color: var(--accent);
      text-decoration: none;
    }
    .eyebrow {
      margin: 0 0 12px;
      color: var(--accent);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 1.12;
      letter-spacing: -0.035em;
    }
    .summary {
      max-width: 760px;
      margin-top: 18px;
      color: var(--muted);
      font-size: 1.02rem;
    }
    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 22px;
    }
    .tag, .meta-pill {
      display: inline-flex;
      align-items: center;
      padding: 5px 9px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      font-size: 0.78rem;
    }
    .tag {
      border-color: rgba(118, 169, 250, 0.36);
      color: var(--accent);
    }
    .validation-pass {
      border-color: rgba(135, 215, 165, 0.44);
      color: #87d7a5;
    }
    .validation-fail {
      border-color: rgba(255, 143, 143, 0.44);
      color: #ff8f8f;
    }
    .validation-pending {
      border-color: rgba(174, 184, 198, 0.34);
      color: var(--muted);
    }
    main {
      padding: 38px 0 80px;
    }
    .doc-layout {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      gap: 28px;
      align-items: start;
    }
    .doc-index {
      position: sticky;
      top: 18px;
      max-height: calc(100vh - 36px);
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(19, 26, 38, 0.82);
      overflow: hidden;
    }
    .doc-index p {
      margin-bottom: 10px;
      color: var(--accent);
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .doc-index nav {
      display: grid;
      gap: 8px;
      max-height: calc(100vh - 112px);
      overflow-y: auto;
      padding-right: 6px;
      overscroll-behavior: contain;
    }
    .doc-index a {
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.35;
      text-decoration: none;
    }
    .doc-index a:hover {
      color: var(--accent);
    }
    .doc-index .toc-level-3 {
      padding-left: 12px;
    }
    .doc-index .toc-level-4 {
      padding-left: 24px;
      font-size: 0.8rem;
    }
    article {
      padding: 30px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--surface);
    }
    h2, h3, h4 {
      margin: 1.7em 0 0.55em;
      line-height: 1.25;
      letter-spacing: -0.02em;
    }
    h2:first-child, h3:first-child, h4:first-child {
      margin-top: 0;
    }
    p, ul, ol, pre, blockquote, .table-wrap {
      margin: 0 0 1.05em;
    }
    ul, ol {
      padding-left: 1.3em;
    }
    li + li {
      margin-top: 0.35em;
    }
    strong {
      color: #f6fbff;
    }
    blockquote {
      padding: 12px 16px;
      border-left: 4px solid var(--accent);
      border-radius: 10px;
      background: rgba(118, 169, 250, 0.08);
      color: var(--muted);
    }
    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 620px;
      background: rgba(8, 11, 17, 0.32);
    }
    th, td {
      padding: 11px 13px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
      text-align: left;
    }
    th {
      background: rgba(118, 169, 250, 0.12);
      color: #f6fbff;
      font-size: 0.88rem;
    }
    tr:last-child td {
      border-bottom: 0;
    }
    pre {
      overflow-x: auto;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #080b11;
    }
    .mermaid {
      margin: 18px 0 1.2em;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #f8fafc;
      color: #0f172a;
      overflow-x: auto;
    }
    code {
      font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
      font-size: 0.9em;
    }
    footer {
      padding: 28px 0 48px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.84rem;
    }
    @media (max-width: 820px) {
      .top-row {
        align-items: flex-start;
        flex-direction: column;
      }
      .doc-layout {
        grid-template-columns: 1fr;
      }
      .doc-index {
        position: static;
      }
    }
  </style>
</head>
<body>
  <header id="top">
    <div class="page-shell">
      <div class="top-row">
        <a class="back-link" href="../../">← 목록</a>
        <span class="meta-pill validation-pending">Codex 검증 전</span>
      </div>
      <p class="eyebrow">코드 분석</p>
      <h1>PJRT 코드 구조 분석</h1>
      <p class="summary">로컬 XLA 저장소의 xla/pjrt 디렉터리와 연결된 참고 문서를 함께 읽고 PJRT 런타임 인터페이스 구조를 분석한다.</p>
      <div class="meta-row">
        <span class="meta-pill">업데이트 2026-07-10</span>
        <span class="tag">XLA</span><span class="tag">PJRT</span><span class="tag">Runtime</span><span class="tag">OpenXLA</span><span class="tag">JAX</span>
      </div>
    </div>
  </header>
  <main class="page-shell doc-layout">
    
    <aside class="doc-index" aria-label="문서 목차">
      <p>Index</p>
      <nav>
        <a href="#top">문서 상단</a>
      </nav>
    </aside>
    
    <div class="article-width">
      <article>
        <p>Error: Reached max turns (24)</p>
      </article>
    </div>
  </main>
  <footer>
    <div class="page-shell">
      이 문서는 입력 자료, 분석 범위, 생성 시점에 따라 달라질 수 있습니다.
    </div>
  </footer>
  <script>
    mermaid.initialize({
      startOnLoad: true,
      theme: "neutral",
      securityLevel: "strict"
    });
  </script>
</body>
</html>
