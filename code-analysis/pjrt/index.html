<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PJRT 코드 구조 분석</title>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0b0f17;
      --surface: #131a26;
      --border: #2a3546;
      --text: #eef3fa;
      --muted: #9eacbf;
      --accent: #76a9fa;
      --max-width: 980px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.75;
    }
    a { color: var(--accent); }
    .page-shell {
      width: min(calc(100% - 32px), var(--max-width));
      margin: 0 auto;
    }
    header {
      padding: 64px 0 42px;
      border-bottom: 1px solid var(--border);
      background:
        radial-gradient(circle at top right, #1d3557 0, transparent 38%),
        linear-gradient(180deg, #101827 0%, var(--bg) 100%);
    }
    .eyebrow {
      margin: 0 0 12px;
      color: var(--accent);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 1.12;
      letter-spacing: -0.035em;
    }
    .summary {
      max-width: 760px;
      margin-top: 18px;
      color: var(--muted);
      font-size: 1.02rem;
    }
    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 22px;
    }
    .tag, .meta-pill {
      display: inline-flex;
      align-items: center;
      padding: 5px 9px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      font-size: 0.78rem;
    }
    .tag {
      border-color: rgba(118, 169, 250, 0.36);
      color: var(--accent);
    }
    .validation-pass {
      border-color: rgba(135, 215, 165, 0.44);
      color: #87d7a5;
    }
    .validation-fail {
      border-color: rgba(255, 143, 143, 0.44);
      color: #ff8f8f;
    }
    .validation-pending {
      border-color: rgba(174, 184, 198, 0.34);
      color: var(--muted);
    }
    main {
      padding: 38px 0 80px;
    }
    article {
      padding: 30px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--surface);
    }
    h2, h3, h4 {
      margin: 1.7em 0 0.55em;
      line-height: 1.25;
      letter-spacing: -0.02em;
    }
    h2:first-child, h3:first-child, h4:first-child {
      margin-top: 0;
    }
    p, ul, pre {
      margin: 0 0 1.05em;
    }
    ul {
      padding-left: 1.3em;
    }
    pre {
      overflow-x: auto;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #080b11;
    }
    .mermaid {
      margin: 18px 0 1.2em;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #f8fafc;
      color: #0f172a;
      overflow-x: auto;
    }
    code {
      font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
      font-size: 0.9em;
    }
    footer {
      padding: 28px 0 48px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.84rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="page-shell">
      <p class="eyebrow">코드 분석</p>
      <h1>PJRT 코드 구조 분석</h1>
      <p class="summary">로컬 XLA 저장소의 xla/pjrt 디렉터리와 연결된 참고 문서를 함께 읽고 PJRT 런타임 인터페이스 구조를 분석한다.</p>
      <div class="meta-row">
        <span class="meta-pill">업데이트 2026-07-10</span>
        <span class="meta-pill validation-pending">Codex 검증 전</span>
        <span class="tag">XLA</span><span class="tag">PJRT</span><span class="tag">Runtime</span><span class="tag">OpenXLA</span><span class="tag">JAX</span>
      </div>
    </div>
  </header>
  <main class="page-shell">
    <article>
      <p>Error: Reached max turns (24)</p>
    </article>
  </main>
  <footer>
    <div class="page-shell">
      이 문서는 입력 자료, 분석 범위, 생성 시점에 따라 달라질 수 있습니다.
    </div>
  </footer>
  <script>
    mermaid.initialize({
      startOnLoad: true,
      theme: "neutral",
      securityLevel: "strict"
    });
  </script>
</body>
</html>
